name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, tmp]
  pull_request:
    branches: [main]

env:
  REGISTRY: mysternathan.freeboxos.fr

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      services: ${{ steps.filter.outputs.services }}
      changed-services: ${{ steps.changed-services.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect frontend changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          if git diff --name-only HEAD~1 HEAD | grep -q "^backend/"; then
            echo "services=true" >> $GITHUB_OUTPUT
          else
            echo "services=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed services
        id: changed-services
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep "^backend/services/" \
            | cut -d'/' -f3 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          if git diff --name-only HEAD~1 HEAD | grep -q "^backend/shared/"; then
            ALL=$(ls backend/services/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "services=$ALL" >> $GITHUB_OUTPUT
          else
            echo "services=$CHANGED" >> $GITHUB_OUTPUT
          fi

  # =====================
  # Build Frontend
  # =====================
  build-frontend:
    runs-on: self-hosted
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Set image tag
        id: tag
        run: echo "tag=${{ env.REGISTRY }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/frontend:latest \
            ./frontend

      - name: Push Docker image
        run: |
          docker push ${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Deploy frontend
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ steps.tag.outputs.tag }} \
            --record
          kubectl rollout status deployment/frontend --timeout=120s

  # =====================
  # Build Services
  # =====================
  build-services:
    runs-on: self-hosted
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.services == 'true' &&
      needs.detect-changes.outputs.changed-services != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changed-services) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Set image tag
        id: tag
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            -f ./backend/services/${{ matrix.service }}/Dockerfile \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:latest

      - name: Deploy service
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=${{ steps.tag.outputs.tag }} \
            --record
          kubectl rollout status deployment/${{ matrix.service }} --timeout=120s
