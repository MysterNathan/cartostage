# .github/workflows/test-db.yml
name: Test DB Connection

on:
  workflow_dispatch: # Déclenchement manuel pour le test

jobs:
  test-db:
    runs-on: self-hosted

    steps:
      - name: Start postgres
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_DB=testdb \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -p 5433:5432 \
            postgres:15

      - name: Wait for postgres
        run: |
          until docker exec postgres-test pg_isready -U test; do
            echo "Waiting..."
            sleep 1
          done

      - name: Test connection
        run: |
          docker exec postgres-test psql -U test -d testdb -c "SELECT version();"

      - name: Cleanup
        if: always()
        run: docker rm -f postgres-test
