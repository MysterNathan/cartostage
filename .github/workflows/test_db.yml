name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    container:
      image: golang:1.25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: apt-get update && apt-get install -y postgresql-client

      - name: Wait for postgres
        run: |
          until pg_isready -h postgres -U test; do
            sleep 1
          done

      - name: Run migrations
        env:
          PGPASSWORD: test
        run: |
          psql -h postgres -U test -d testdb < ./backend/shared/database/init-filieres.sql
          psql -h postgres -U test -d testdb < ./backend/shared/database/migrations/create_establishment.sql
          psql -h postgres -U test -d testdb < ./backend/shared/database/migrations/create_users_table.sql

      - name: Run tests
        env:
          TEST_DB_HOST: postgres
          TEST_DB_PORT: 5432
          TEST_DB_USER: test
          TEST_DB_PASSWORD: test
          TEST_DB_NAME: testdb
        run: |
          go install gotest.tools/gotestsum@latest
          cd backend/services/auth-service
          gotestsum --junitfile=report.xml ./...

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: backend/services/auth-service/report.xml

