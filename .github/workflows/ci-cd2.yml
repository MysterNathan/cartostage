name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, tmp]
  pull_request:
    branches: [main]

env:
  REGISTRY: 192.168.1.193:30345

jobs:
  # =====================
  # Détection des changes
  # =====================
  detect-changes:
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect frontend changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi
          


  # =====================
  # Build Frontend
  # =====================
  build-frontend:
    runs-on: self-hosted
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${{ env.REGISTRY }}/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/frontend:latest \
            ./frontend

      - name: Push Docker image
        run: |
          docker push ${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Deploy frontend
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ steps.tag.outputs.tag }} \
            --record
          kubectl rollout status deployment/frontend --timeout=120s

