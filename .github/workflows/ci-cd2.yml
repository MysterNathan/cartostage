name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, tmp]
  pull_request:
    branches: [main]

env:
  REGISTRY: 192.168.1.193:30345

jobs:
  build-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Debug vars
        run: |
          echo "REGISTRY=${{ env.REGISTRY }}"
          echo "SHA=${{ github.sha }}"
          echo "WORKSPACE=${{ github.workspace }}"
          echo "REPOSITORY=${{ github.repository }}"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          cat ${{ github.workspace }}/frontend/Dockerfile

      - name: Build and push with Kaniko
        run: |
          /tools/kaniko \
            --context=dir://$GITHUB_WORKSPACE/frontend \
            --dockerfile=$GITHUB_WORKSPACE/frontend/Dockerfile \
            --destination=${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            --destination=${{ env.REGISTRY }}/frontend:latest \
            --insecure \
            --skip-tls-verify

      - name: Deploy frontend
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/frontend:${{ github.sha }}
          kubectl rollout status deployment/frontend --timeout=120s
