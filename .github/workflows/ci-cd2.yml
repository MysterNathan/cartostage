name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, tmp]
  pull_request:
    branches: [main]

env:
  REGISTRY: 192.168.1.193:30345

jobs:
  detect-changes:
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect frontend changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  build-frontend:
    runs-on: self-hosted
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build and push with Kaniko
        run: |
          kubectl run kaniko-frontend-${{ github.run_id }} \
            --image=gcr.io/kaniko-project/executor:latest \
            --restart=Never \
            --namespace=github-runners \
            --overrides='{
              "spec": {
                "serviceAccountName": "github-runner-sa",
                "containers": [{
                  "name": "kaniko",
                  "image": "gcr.io/kaniko-project/executor:latest",
                  "args": [
                    "--context=git://github.com/${{ github.repository }}#refs/heads/${{ github.ref_name }}",
                    "--context-sub-path=frontend",
                    "--dockerfile=Dockerfile",
                    "--destination=${{ env.REGISTRY }}/frontend:${{ github.sha }}",
                    "--destination=${{ env.REGISTRY }}/frontend:latest",
                    "--insecure",
                    "--skip-tls-verify"
                  ]
                }]
              }
            }' \
            --wait \
            --timeout=300s

      - name: Cleanup kaniko pod
        if: always()
        run: kubectl delete pod kaniko-frontend-${{ github.run_id }} -n github-runners --ignore-not-found

      - name: Deploy frontend
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/frontend:${{ github.sha }}
          kubectl rollout status deployment/frontend --timeout=120s
