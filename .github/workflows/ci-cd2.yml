name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, tmp]
  pull_request:
    branches: [main]

env:
  REGISTRY: 192.168.1.193:30345

jobs:
  build-frontend:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build and push with Kaniko
        run: |
          /tools/kaniko \
            --context=${{ github.repository }}/frontend \
            --dockerfile=${{ github.repository }}/frontend/Dockerfile \
            --destination=${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            --destination=${{ env.REGISTRY }}/frontend:latest \
            --insecure \
            --skip-tls-verify

      - name: Deploy frontend
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/frontend:${{ github.sha }}
          kubectl rollout status deployment/frontend --timeout=120s
