version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stages-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stages_db
      POSTGRES_USER: stages_user
      POSTGRES_PASSWORD: stages_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - stages-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stages_user -d stages_db"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: stages-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      # Variables pour la base de données (si tu décides de l'utiliser)
      DATABASE_URL: postgresql://stages_user:stages_password@postgres:5432/stages_db
      # Variables pour ton système d'auth custom
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stages-network
    volumes:
      - ./data:/app/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stages-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stages.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - stages-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  stages-network:
    driver: bridge
