version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stages-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: stages_user
      POSTGRES_PASSWORD: stages_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/database/init-stages.sql:/docker-entrypoint-initdb.d/01-init-stages.sql:ro
      - ./backend/internal/database/init-filieres.sql:/docker-entrypoint-initdb.d/02-init-filieres.sql:ro
    networks:
      - stages-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stages-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      GIN_MODE: release
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: stages_user
      POSTGRES_PASSWORD: stages_password
      POSTGRES_DB: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - stages-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: stages-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: http://backend:8080/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - stages-network

volumes:
  postgres_data:
    driver: local

networks:
  stages-network:
    driver: bridge
