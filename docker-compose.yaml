version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stages-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: stages_user
      POSTGRES_PASSWORD: stages_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stages-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stages-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      GIN_MODE: release
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: stages_user
      POSTGRES_PASSWORD: stages_password
      POSTGRES_DB: postgres
      JWT_SECRET: 'Er3vsrwb3y35GN6kQH9fFs6HdQnqMh+WV0uJiQHUkvuFZMSczD/jf/wMCA31Jx2a WvZZaRkylQ9iCqcToLNpOQ=='
    expose:
      - "8080"
    depends_on:
      - postgres
    networks:
      - stages-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_API_URL= http://crissime.freeboxos.fr
    container_name: stages-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: http://crissime.freeboxos.fr
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - stages-network

  nginx:
    image: nginx:alpine
    container_name: stages-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/ssl:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - stages-network

volumes:
  postgres_data:
    driver: local

networks:
  stages-network:
    driver: bridge
