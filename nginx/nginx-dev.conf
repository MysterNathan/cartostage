server {
    listen 80;
    server_name localhost;

    # Configuration HTTP/2 moderne
    http2 on;

    # Headers de sécurité (adaptés pour dev local)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Microservice Auth - Routes d'authentification
        location ~* ^/api/(login|register|auth|refresh|profile|logout|validate)/?.*$ {
        proxy_pass http://stages-auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port 80;

    }

    # Microservice Stage-Map - Routes stages et filières
    location ~* ^/api/(stages|filieres)(/.*)?$ {
        proxy_pass http://stages-map;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port 80;


    }

    # Microservice Enterprise - Routes entreprises
    location ~* ^/api/enterprises(/.*)?$ {
        proxy_pass http://stages-enterprise;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port 80;

    }

    # Route de fallback pour les autres routes API
    location /api/ {
        return 404 '{"error": "API endpoint not found"}';
        add_header Content-Type application/json;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 '{"status": "healthy", "timestamp": "$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Proxy pour le frontend Next.js
    location / {
        proxy_pass http://stages-frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port 80;

        # Support pour Next.js hot reload
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
